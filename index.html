<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahiran</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Vazirmatn',sans-serif;
background: radial-gradient(circle at 50% 30%, #1a0f2e 0%, #000000 65%);
color:white;
text-align:center;
padding-top:70px;
}

/* دایره هدر شیشه‌ای */
.glass-circle{
width:260px;
height:260px;
margin:0 auto 60px auto;
border-radius:50%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:2px solid rgba(250,204,21,0.4);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 50px rgba(250,204,21,0.25);
transition:0.5s;
}

.glass-circle:hover{
transform:scale(1.05);
box-shadow:0 0 80px rgba(250,204,21,0.6);
}

.circle-title{
font-size:40px;
font-weight:900;
color:#facc15;
text-shadow:0 0 20px #facc15;
}

.circle-sub{
margin-top:10px;
font-size:18px;
letter-spacing:3px;
color:#fde68a;
opacity:0.85;
}

/* دکمه‌ها */
.btn{
display:block;
margin:18px auto;
padding:18px;
width:90%;
max-width:420px;
border-radius:22px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:2px solid rgba(250,204,21,0.4);
font-size:22px;
color:white;
text-decoration:none;
transition:0.4s;
}

.btn i{
margin-left:10px;
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
border-color:#facc15;
box-shadow:0 0 45px #facc15;
}

.footer{
margin-top:70px;
color:#facc15;
opacity:0.6;
font-size:14px;
}
</style>
</head>

<body>

<!-- دایره شیشه‌ای هدر -->
<div class="glass-circle">
    <div class="circle-title">طاهیران</div>
    <div class="circle-sub">tahiran pc</div>
</div>

<!-- دکمه‌ها به ترتیب: اینستا، روبیکا، تلگرام، ایتا -->

<a href="https://www.instagram.com/tahiran_co" target="_blank" class="btn">
<i class="fa-brands fa-instagram"></i>
اینستاگرام
</a>

<a href="https://rubika.ir/tahiranpc" target="_blank" class="btn">
<i class="fa-solid fa-comments"></i>
روبیکا
</a>

<a href="https://t.me/tahiranpc" target="_blank" class="btn">
<i class="fa-brands fa-telegram"></i>
تلگرام
</a>

<a href="https://eitaa.com/tahiranpc" target="_blank" class="btn">
<i class="fa-solid fa-hashtag"></i>
ایتا
</a>

<div class="footer">
© 2026 Tahiran
</div>

</body>
</html>
